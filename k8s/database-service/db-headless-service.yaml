# It allows other microservices to reach individual database replicas via direct DNS entries rather than a single load-balanced IP.

apiVersion: v1           
kind: Service                  
metadata:
  name: postgres-headless      
spec:
  selector:
    app: postgres                  # Select pods with label app=postgres
  clusterIP: None                  # Make it a Headless Service
  ports:
  - name: postgres               
    port: 5432                    
    targetPort: 5432               
