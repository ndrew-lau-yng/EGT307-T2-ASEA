apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: anonymooseuser29/frontend:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
          env:
            - name: INFERENCE_URL
              value: "http://inference-service:8000/predict"   #to be matched with inference service metadata name
